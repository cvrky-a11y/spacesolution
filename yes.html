<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tak co? — Air Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #99cc33;
      --dark: #202224;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: 32px;
      padding: 48px 48px 56px;
      width: 100%;
      max-width: 520px;
      margin: 32px 16px;
      text-align: center;
    }

    /* ── CRAZY HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 36px;
      position: relative;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-wrap img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--green);
      display: block;
      position: relative;
      z-index: 1;
    }
    /* spinning rainbow ring */
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(#ff006e, #fb5607, #ffbe0b, #99cc33, #3a86ff, #8338ec, #ff006e);
      animation: spin 2s linear infinite;
      z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .plus {
      font-size: 32px;
      font-weight: 900;
      color: var(--dark);
      padding: 0 16px;
      animation: pulse 1.2s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.3); color: var(--green); }
    }

    .logo-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .logo-wrap img {
      height: 64px;
      display: block;
      position: relative;
      z-index: 1;
      animation: logoBounce 2s ease-in-out infinite;
    }
    @keyframes logoBounce {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50%       { transform: rotate(3deg) scale(1.08); }
    }
    /* floating emojis around logo */
    .logo-wrap::before {
      content: '🦄';
      position: absolute;
      font-size: 22px;
      top: -18px; right: -18px;
      animation: orbit 3s linear infinite;
      z-index: 2;
    }
    .logo-wrap::after {
      content: '🐸';
      position: absolute;
      font-size: 18px;
      bottom: -14px; left: -14px;
      animation: orbit 4s linear infinite reverse;
      z-index: 2;
    }
    @keyframes orbit {
      0%   { transform: rotate(0deg) translateX(4px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(4px) rotate(-360deg); }
    }

    /* extra floating emojis scattered around header */
    .emoji-float {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      animation: floatBit 3s ease-in-out infinite;
    }
    .emoji-float:nth-child(1) { top: -24px; left: 20px;  animation-delay: 0s;   font-size: 18px; }
    .emoji-float:nth-child(2) { top: -20px; right: 30px; animation-delay: .4s;  font-size: 22px; }
    .emoji-float:nth-child(3) { bottom: -20px; left: 40px; animation-delay: .8s; font-size: 16px; }
    .emoji-float:nth-child(4) { bottom: -18px; right: 20px; animation-delay: 1.2s; font-size: 20px; }
    @keyframes floatBit {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ── TITLE ── */
    .card h1 {
      font-size: 32px;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .card h1 span {
      background: linear-gradient(90deg, #ff006e, #ffbe0b, #99cc33, #3a86ff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradText 2s linear infinite;
    }
    @keyframes gradText {
      0%   { background-position: 0%; }
      100% { background-position: 200%; }
    }
    .card .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 36px;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
      text-align: left;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f5f5f5;
      border: 2px solid #e8e8e8;
      border-radius: 14px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all .15s;
    }
    .option:hover {
      border-color: var(--green);
      background: #f0fadc;
      transform: scale(1.02);
    }
    .option.checked {
      border-color: var(--green);
      background: #f0fadc;
    }
    .option input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 24px; height: 24px;
      border: 2.5px solid #ccc;
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      transition: all .15s;
      position: relative;
    }
    .option input[type="checkbox"]:checked {
      background: var(--green);
      border-color: var(--green);
    }
    .option input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 14px;
      font-weight: 900;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .option-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      flex: 1;
    }
    .option-emoji { font-size: 22px; flex-shrink: 0; }

    .option.special {
      background: var(--dark);
      border-color: var(--dark);
      animation: wiggle 1s ease-in-out infinite;
    }
    .option.special .option-label { color: var(--green); }
    .option.special:hover { animation: none; transform: scale(1.02); background: #333; }
    .option.special input[type="checkbox"] { border-color: #555; }
    .option.special input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(-1deg); }
      75%       { transform: rotate(1deg); }
    }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%;
      background: var(--green);
      color: var(--dark);
      border: none;
      border-radius: 100px;
      padding: 18px 32px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-submit:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 32px rgba(153,204,51,0.5);
    }
    .btn-submit:active { transform: scale(0.98); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 2.5s ease-out forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* ── SUCCESS ── */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .success .big-emoji {
      font-size: 96px;
      animation: popIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .success h2 { font-size: 28px; font-weight: 900; color: var(--dark); }
    .success p  { color: #666; font-size: 15px; }

    @media (max-width: 560px) {
      .card { padding: 32px 20px 40px; }
      .card h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- CRAZY HEADER -->
  <div class="header">
    <span class="emoji-float">🦋</span>
    <span class="emoji-float">🐬</span>
    <span class="emoji-float">🦁</span>
    <span class="emoji-float">🐙</span>

    <div class="avatar-wrap">
      <img src="avatar.png" alt="Martin Cvrček" />
    </div>

    <div class="plus">+</div>

    <div class="logo-wrap">
      <img src="ab_logo.jpg" alt="Air Bank" />
    </div>
  </div>

  <h1>Tak <span>co říkáte?</span></h1>
  <p class="subtitle">Vyberte všechny správné odpovědi. (Hint: jsou všechny.)</p>

  <div id="form-wrap">
    <div class="options">

      <label class="option">
        <input type="checkbox" />
        <span class="option-label">ANO</span>
        <span class="option-emoji">✅</span>
      </label>

      <label class="option">
        <input type="checkbox" />
        <span class="option-label">URČITĚ ANO</span>
        <span class="option-emoji">🙌</span>
      </label>

      <label class="option">
        <input type="checkbox" />
        <span class="option-label">100 % ANO</span>
        <span class="option-emoji">💯</span>
      </label>

      <label class="option special">
        <input type="checkbox" />
        <span class="option-label">Už si tu měl pracovat 4 minuty!</span>
        <span class="option-emoji">⏱️</span>
      </label>

    </div>

    <button class="btn-submit" onclick="handleSubmit()">Potvrdit správné odpovědi 🚀</button>
  </div>

  <div class="success" id="success">
    <div class="big-emoji">🎉</div>
    <h2>Správně!</h2>
    <p>Vidíme se v pondělí? 😄</p>
  </div>

</div>

<script>
  document.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      const cb = opt.querySelector('input[type="checkbox"]');
      setTimeout(() => opt.classList.toggle('checked', cb.checked), 0);
    });
  });

  function handleSubmit() {
    const colors = ['#99cc33','#ff006e','#ffbe0b','#3a86ff','#8338ec','#fb5607'];
    for (let i = 0; i < 100; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width  = (Math.random() * 10 + 6) + 'px';
      el.style.height = (Math.random() * 10 + 6) + 'px';
      el.style.animationDelay    = Math.random() * 0.8 + 's';
      el.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }
    document.getElementById('form-wrap').style.display = 'none';
    const s = document.getElementById('success');
    s.style.display = 'flex';
  }
</script>

</body>
</html>
