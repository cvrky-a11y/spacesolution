<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tak co? — Air Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #99cc33;
      --dark: #202224;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── CRAZY BG ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg,
        #ff006e 0%,
        #fb5607 15%,
        #ffbe0b 30%,
        #99cc33 45%,
        #3a86ff 60%,
        #8338ec 75%,
        #ff006e 100%
      );
      background-size: 400% 400%;
      animation: gradShift 4s ease infinite;
      opacity: .85;
      z-index: 0;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── FLOATING ANIMALS ── */
    .animals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .animal {
      position: absolute;
      font-size: 64px;
      animation: float linear infinite;
      user-select: none;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
    }

    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg) scale(1); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translateY(-20vh) rotate(720deg) scale(1.2); opacity: 0; }
    }

    @keyframes sway {
      0%, 100% { margin-left: 0; }
      25%  { margin-left: 40px; }
      75%  { margin-left: -40px; }
    }

    .animal:nth-child(1)  { left: 5%;  animation-duration: 6s;  animation-delay: 0s;    font-size: 72px; }
    .animal:nth-child(2)  { left: 15%; animation-duration: 8s;  animation-delay: 0.5s;  font-size: 56px; }
    .animal:nth-child(3)  { left: 25%; animation-duration: 5s;  animation-delay: 1s;    font-size: 80px; }
    .animal:nth-child(4)  { left: 35%; animation-duration: 9s;  animation-delay: 0.2s;  font-size: 64px; }
    .animal:nth-child(5)  { left: 45%; animation-duration: 7s;  animation-delay: 1.5s;  font-size: 48px; }
    .animal:nth-child(6)  { left: 55%; animation-duration: 6s;  animation-delay: 0.8s;  font-size: 88px; }
    .animal:nth-child(7)  { left: 65%; animation-duration: 10s; animation-delay: 0.3s;  font-size: 60px; }
    .animal:nth-child(8)  { left: 75%; animation-duration: 5s;  animation-delay: 2s;    font-size: 72px; }
    .animal:nth-child(9)  { left: 85%; animation-duration: 8s;  animation-delay: 0.7s;  font-size: 52px; }
    .animal:nth-child(10) { left: 92%; animation-duration: 6s;  animation-delay: 1.2s;  font-size: 76px; }
    .animal:nth-child(11) { left: 10%; animation-duration: 7s;  animation-delay: 3s;    font-size: 64px; }
    .animal:nth-child(12) { left: 50%; animation-duration: 9s;  animation-delay: 2.5s;  font-size: 56px; }
    .animal:nth-child(13) { left: 70%; animation-duration: 5s;  animation-delay: 1.8s;  font-size: 84px; }
    .animal:nth-child(14) { left: 30%; animation-duration: 11s; animation-delay: 0.4s;  font-size: 48px; }
    .animal:nth-child(15) { left: 80%; animation-duration: 6s;  animation-delay: 3.5s;  font-size: 70px; }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 56px 48px;
      width: 100%;
      max-width: 520px;
      margin: 32px 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,255,255,0.5);
      animation: cardBounce 3s ease-in-out infinite;
      text-align: center;
    }
    @keyframes cardBounce {
      0%, 100% { transform: translateY(0) rotate(-0.5deg); }
      50%       { transform: translateY(-8px) rotate(0.5deg); }
    }

    .card-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .card-logo img {
      height: 44px;
    }

    .card h1 {
      font-size: 32px;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .card h1 span {
      background: linear-gradient(90deg, #ff006e, #ffbe0b, #99cc33, #3a86ff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradText 2s linear infinite;
    }
    @keyframes gradText {
      0%   { background-position: 0%; }
      100% { background-position: 200%; }
    }

    .card .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 40px;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
      text-align: left;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f5f5f5;
      border: 2px solid #e8e8e8;
      border-radius: 14px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }
    .option:hover {
      border-color: var(--green);
      background: #f0fadc;
      transform: scale(1.02);
    }
    .option input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border: 2.5px solid #ccc;
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      transition: all .15s;
      position: relative;
    }
    .option input[type="checkbox"]:checked {
      background: var(--green);
      border-color: var(--green);
    }
    .option input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 14px;
      font-weight: 900;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .option.checked {
      border-color: var(--green);
      background: #f0fadc;
    }

    .option-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      flex: 1;
    }

    .option:nth-child(1) .option-emoji { font-size: 24px; }
    .option:nth-child(2) .option-emoji { font-size: 24px; }
    .option:nth-child(3) .option-emoji { font-size: 24px; }
    .option:nth-child(4) .option-emoji { font-size: 24px; }
    .option-emoji { flex-shrink: 0; }

    /* last option is special */
    .option.special {
      background: var(--dark);
      border-color: var(--dark);
      animation: wiggle 1s ease-in-out infinite;
    }
    .option.special .option-label { color: var(--green); }
    .option.special:hover { transform: scale(1.03); background: #333; }
    .option.special input[type="checkbox"] { border-color: #555; background: #333; }
    .option.special input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(-1deg); }
      75%       { transform: rotate(1deg); }
    }
    .option.special:hover { animation: none; transform: scale(1.03); }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%;
      background: var(--green);
      color: var(--dark);
      border: none;
      border-radius: 100px;
      padding: 18px 32px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 32px rgba(153,204,51,0.5);
    }
    .btn-submit:active { transform: scale(0.98); }

    /* ── CONFETTI on submit ── */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 2s ease-out forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-10px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* ── SUCCESS ── */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .success .big-emoji {
      font-size: 96px;
      animation: popIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .success h2 {
      font-size: 28px;
      font-weight: 900;
      color: var(--dark);
    }
    .success p { color: #666; font-size: 15px; }
  </style>
</head>
<body>

<!-- BG -->
<div class="bg-gradient"></div>

<!-- FLOATING ANIMALS -->
<div class="animals">
  <div class="animal">🦄</div>
  <div class="animal">🐸</div>
  <div class="animal">🦋</div>
  <div class="animal">🐬</div>
  <div class="animal">🦊</div>
  <div class="animal">🐙</div>
  <div class="animal">🦁</div>
  <div class="animal">🐨</div>
  <div class="animal">🦄</div>
  <div class="animal">🐳</div>
  <div class="animal">🦩</div>
  <div class="animal">🐉</div>
  <div class="animal">🦚</div>
  <div class="animal">🐸</div>
  <div class="animal">🦄</div>
</div>

<!-- CARD -->
<div class="card">

  <div class="card-logo">
    <img src="ab_logo.jpg" alt="Air Bank" />
  </div>

  <h1>Tak <span>co říkáte?</span></h1>
  <p class="subtitle">Vyberte všechny správné odpovědi. (Hint: jsou všechny.)</p>

  <div id="form-wrap">
    <div class="options">

      <label class="option" onclick="this.classList.toggle('checked')">
        <input type="checkbox" />
        <span class="option-label">ANO</span>
        <span class="option-emoji">✅</span>
      </label>

      <label class="option" onclick="this.classList.toggle('checked')">
        <input type="checkbox" />
        <span class="option-label">URČITĚ ANO</span>
        <span class="option-emoji">🙌</span>
      </label>

      <label class="option" onclick="this.classList.toggle('checked')">
        <input type="checkbox" />
        <span class="option-label">100 % ANO</span>
        <span class="option-emoji">💯</span>
      </label>

      <label class="option special" onclick="this.classList.toggle('checked')">
        <input type="checkbox" />
        <span class="option-label">Už si tu měl pracovat 4 minuty!</span>
        <span class="option-emoji">⏱️</span>
      </label>

    </div>

    <button class="btn-submit" onclick="handleSubmit()">Potvrdit správné odpovědi 🚀</button>
  </div>

  <div class="success" id="success">
    <div class="big-emoji">🎉</div>
    <h2>Správně!</h2>
    <p>Vidíme se v pondělí? 😄</p>
  </div>

</div>

<script>
  // Auto-check all on label click (fix for nested checkbox)
  document.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      const cb = opt.querySelector('input[type="checkbox"]');
      // toggle happens natively, just sync class
      setTimeout(() => {
        opt.classList.toggle('checked', cb.checked);
      }, 0);
    });
  });

  function handleSubmit() {
    // confetti
    const colors = ['#99cc33','#ff006e','#ffbe0b','#3a86ff','#8338ec','#fb5607'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (Math.random() * 10 + 6) + 'px';
      el.style.height = (Math.random() * 10 + 6) + 'px';
      el.style.animationDelay = Math.random() * 0.8 + 's';
      el.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // show success
    document.getElementById('form-wrap').style.display = 'none';
    const s = document.getElementById('success');
    s.style.display = 'flex';
  }
</script>

</body>
</html>
